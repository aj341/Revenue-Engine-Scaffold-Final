openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Design Bees Outbound Revenue Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: prospects
    description: Prospect and account management
  - name: contacts
    description: Contact management
  - name: analyses
    description: Homepage analysis operations
  - name: insights
    description: Insight library management
  - name: sequences
    description: Outreach sequence management
  - name: touches
    description: Touch / activity tracking
  - name: dashboard
    description: Dashboard metrics and KPIs
  - name: experiments
    description: A/B experiment tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── PROSPECTS ──────────────────────────────────────────────────────────────
  /prospects:
    get:
      operationId: listProspects
      tags: [prospects]
      summary: List all prospect accounts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: priorityTier
          in: query
          schema:
            type: string
        - name: icpType
          in: query
          schema:
            type: string
        - name: outreachStatus
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of prospects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProspectListResponse"
    post:
      operationId: createProspect
      tags: [prospects]
      summary: Create a new prospect account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProspectRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"

  /prospects/import:
    post:
      operationId: importProspects
      tags: [prospects]
      summary: Import prospects from CSV data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProspectsRequest"
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /prospects/{id}:
    get:
      operationId: getProspect
      tags: [prospects]
      summary: Get a prospect by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prospect details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProspectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProspect
      tags: [prospects]
      summary: Update a prospect
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProspectRequest"
      responses:
        "200":
          description: Updated prospect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"
    delete:
      operationId: deleteProspect
      tags: [prospects]
      summary: Delete a prospect
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CONTACTS ───────────────────────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts
      parameters:
        - name: prospectId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  # ─── ANALYSES ───────────────────────────────────────────────────────────────
  /analyses:
    get:
      operationId: listAnalyses
      tags: [analyses]
      summary: List homepage analyses
      parameters:
        - name: prospectId
          in: query
          schema:
            type: integer
        - name: issueCode
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of analyses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisListResponse"
    post:
      operationId: createAnalysis
      tags: [analyses]
      summary: Submit a homepage for analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnalysisRequest"
      responses:
        "201":
          description: Analysis created/queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"

  /analyses/{id}:
    get:
      operationId: getAnalysis
      tags: [analyses]
      summary: Get an analysis by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateAnalysis
      tags: [analyses]
      summary: Update / complete an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnalysisRequest"
      responses:
        "200":
          description: Updated analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"

  /analyses/clusters:
    get:
      operationId: getIssueClusters
      tags: [analyses]
      summary: Get issue clusters grouped by issue code
      responses:
        "200":
          description: Issue cluster summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueClustersResponse"

  # ─── INSIGHTS ───────────────────────────────────────────────────────────────
  /insights:
    get:
      operationId: listInsights
      tags: [insights]
      summary: List insight blocks
      parameters:
        - name: issueCode
          in: query
          schema:
            type: string
        - name: icp
          in: query
          schema:
            type: string
        - name: channel
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of insight blocks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightListResponse"
    post:
      operationId: createInsight
      tags: [insights]
      summary: Create an insight block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInsightRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insight"

  /insights/{id}:
    get:
      operationId: getInsight
      tags: [insights]
      summary: Get an insight block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insight"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateInsight
      tags: [insights]
      summary: Update an insight block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInsightRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insight"
    delete:
      operationId: deleteInsight
      tags: [insights]
      summary: Delete an insight block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── SEQUENCES ──────────────────────────────────────────────────────────────
  /sequences:
    get:
      operationId: listSequences
      tags: [sequences]
      summary: List outreach sequences
      parameters:
        - name: prospectId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of sequences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SequenceListResponse"
    post:
      operationId: createSequence
      tags: [sequences]
      summary: Create an outreach sequence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSequenceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sequence"

  /sequences/{id}:
    get:
      operationId: getSequence
      tags: [sequences]
      summary: Get a sequence by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sequence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sequence"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSequence
      tags: [sequences]
      summary: Update a sequence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSequenceRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sequence"

  /sequences/generate:
    post:
      operationId: generateSequence
      tags: [sequences]
      summary: Generate a sequence using analysis and insight data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateSequenceRequest"
      responses:
        "200":
          description: Generated sequence steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedSequence"

  # ─── TOUCHES ────────────────────────────────────────────────────────────────
  /touches:
    get:
      operationId: listTouches
      tags: [touches]
      summary: List touch activities
      parameters:
        - name: prospectId
          in: query
          schema:
            type: integer
        - name: contactId
          in: query
          schema:
            type: integer
        - name: channel
          in: query
          schema:
            type: string
        - name: dueToday
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of touches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TouchListResponse"
    post:
      operationId: createTouch
      tags: [touches]
      summary: Log a touch activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTouchRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Touch"

  /touches/{id}:
    put:
      operationId: updateTouch
      tags: [touches]
      summary: Update a touch (e.g. mark replied, booked)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTouchRequest"
      responses:
        "200":
          description: Updated touch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Touch"

  # ─── DASHBOARD ──────────────────────────────────────────────────────────────
  /dashboard/metrics:
    get:
      operationId: getDashboardMetrics
      tags: [dashboard]
      summary: Get top-level KPI metrics
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

  /dashboard/pipeline:
    get:
      operationId: getPipelineSnapshot
      tags: [dashboard]
      summary: Get pipeline stage counts
      responses:
        "200":
          description: Pipeline snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineSnapshot"

  /dashboard/activity-today:
    get:
      operationId: getActivityToday
      tags: [dashboard]
      summary: Get today's tasks and hot prospects
      responses:
        "200":
          description: Today's activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityToday"

  /dashboard/channel-performance:
    get:
      operationId: getChannelPerformance
      tags: [dashboard]
      summary: Get reply rates and performance by channel
      responses:
        "200":
          description: Channel performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelPerformanceResponse"

  /dashboard/top-hooks:
    get:
      operationId: getTopHooks
      tags: [dashboard]
      summary: Get top performing message hooks and CTAs
      responses:
        "200":
          description: Top hooks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopHooksResponse"

  # ─── EXPERIMENTS ────────────────────────────────────────────────────────────
  /experiments:
    get:
      operationId: listExperiments
      tags: [experiments]
      summary: List A/B experiments
      responses:
        "200":
          description: List of experiments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentListResponse"
    post:
      operationId: createExperiment
      tags: [experiments]
      summary: Create an experiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExperimentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"

  /experiments/{id}:
    put:
      operationId: updateExperiment
      tags: [experiments]
      summary: Update experiment results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExperimentRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    # ─── PROSPECT SCHEMAS ──────────────────────────────────────────────────────
    Prospect:
      type: object
      properties:
        id:
          type: integer
        companyName:
          type: string
        domain:
          type: string
        websiteUrl:
          type: string
        industry:
          type: string
        subIndustry:
          type: string
        employeeCountBand:
          type: string
          enum: ["1-10", "11-50", "51-100", "101-250", "250+"]
        revenueBand:
          type: string
          nullable: true
        geography:
          type: string
          nullable: true
        source:
          type: string
        sourceDetail:
          type: string
          nullable: true
        sourceCaptureDate:
          type: string
          format: date-time
          nullable: true
        accountOwner:
          type: string
          nullable: true
        priorityTier:
          type: string
          enum: ["A", "B", "C"]
        icpType:
          type: string
          enum: ["founder", "marketing_manager", "agency"]
        fitScore:
          type: integer
          minimum: 0
          maximum: 100
        outreachStatus:
          type: string
          enum: ["not_started", "in_sequence", "replied", "booked", "showed", "closed_won", "closed_lost", "nurture"]
        likelyPrimaryProblem:
          type: string
          nullable: true
        likelySecondaryProblem:
          type: string
          nullable: true
        likelyAssetToOffer:
          type: string
          nullable: true
        personalizationLevel:
          type: string
          enum: ["high", "medium", "low"]
          nullable: true
        sequenceFamily:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        latestAnalysisId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - companyName
        - domain
        - websiteUrl
        - industry
        - priorityTier
        - icpType
        - fitScore
        - outreachStatus
        - source
        - createdAt
        - updatedAt

    ProspectDetail:
      allOf:
        - $ref: "#/components/schemas/Prospect"
        - type: object
          properties:
            contacts:
              type: array
              items:
                $ref: "#/components/schemas/Contact"
            analyses:
              type: array
              items:
                $ref: "#/components/schemas/Analysis"
            sequences:
              type: array
              items:
                $ref: "#/components/schemas/Sequence"
            recentTouches:
              type: array
              items:
                $ref: "#/components/schemas/Touch"

    ProspectListResponse:
      type: object
      properties:
        prospects:
          type: array
          items:
            $ref: "#/components/schemas/Prospect"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - prospects
        - total
        - page
        - pageSize

    CreateProspectRequest:
      type: object
      properties:
        companyName:
          type: string
        domain:
          type: string
        websiteUrl:
          type: string
        industry:
          type: string
        subIndustry:
          type: string
          nullable: true
        employeeCountBand:
          type: string
          enum: ["1-10", "11-50", "51-100", "101-250", "250+"]
        revenueBand:
          type: string
          nullable: true
        geography:
          type: string
          nullable: true
        source:
          type: string
        sourceDetail:
          type: string
          nullable: true
        accountOwner:
          type: string
          nullable: true
        priorityTier:
          type: string
          enum: ["A", "B", "C"]
        icpType:
          type: string
          enum: ["founder", "marketing_manager", "agency"]
        fitScore:
          type: integer
          minimum: 0
          maximum: 100
        notes:
          type: string
          nullable: true
      required:
        - companyName
        - domain
        - websiteUrl
        - industry
        - employeeCountBand
        - source
        - priorityTier
        - icpType
        - fitScore

    UpdateProspectRequest:
      type: object
      properties:
        companyName:
          type: string
        domain:
          type: string
        websiteUrl:
          type: string
        industry:
          type: string
        subIndustry:
          type: string
          nullable: true
        employeeCountBand:
          type: string
          enum: ["1-10", "11-50", "51-100", "101-250", "250+"]
        revenueBand:
          type: string
          nullable: true
        geography:
          type: string
          nullable: true
        accountOwner:
          type: string
          nullable: true
        priorityTier:
          type: string
          enum: ["A", "B", "C"]
        icpType:
          type: string
          enum: ["founder", "marketing_manager", "agency"]
        fitScore:
          type: integer
          minimum: 0
          maximum: 100
        outreachStatus:
          type: string
          enum: ["not_started", "in_sequence", "replied", "booked", "showed", "closed_won", "closed_lost", "nurture"]
        likelyPrimaryProblem:
          type: string
          nullable: true
        likelySecondaryProblem:
          type: string
          nullable: true
        likelyAssetToOffer:
          type: string
          nullable: true
        personalizationLevel:
          type: string
          enum: ["high", "medium", "low"]
          nullable: true
        sequenceFamily:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    ImportProspectsRequest:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - rows

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
        - imported
        - skipped
        - errors

    # ─── CONTACT SCHEMAS ───────────────────────────────────────────────────────
    Contact:
      type: object
      properties:
        id:
          type: integer
        prospectId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        jobTitle:
          type: string
          nullable: true
        seniority:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        linkedinUrl:
          type: string
          nullable: true
        contactSource:
          type: string
          nullable: true
        outreachStatus:
          type: string
          enum: ["not_started", "in_sequence", "replied", "booked", "opted_out"]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - prospectId
        - firstName
        - lastName
        - fullName
        - outreachStatus
        - createdAt

    ContactListResponse:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        total:
          type: integer
      required:
        - contacts
        - total

    CreateContactRequest:
      type: object
      properties:
        prospectId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        jobTitle:
          type: string
          nullable: true
        seniority:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        linkedinUrl:
          type: string
          nullable: true
        contactSource:
          type: string
          nullable: true
        notes:
